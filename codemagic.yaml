workflows:
  ios-build:
    name: FlightCompanion iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    # ── Triggering ─────────────────────────────────────────────
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    # ── Environment ────────────────────────────────────────────
    environment:
      xcode: latest

      # Codemagic native signing — no manual base64 or .p12 needed.
      # REQUIRED: Connect your Apple ID in Codemagic:
      #   Team Settings → Integrations → Apple Developer Portal → Add
      # Then Codemagic auto-creates/fetches your certificate & profile.
      ios_signing:
        distribution_type: development   # free Apple ID = development only
        bundle_identifier: com.aarod23.FlightCompanion

      vars:
        XCODE_PROJECT: "ios/FlightCompanion.xcodeproj"
        XCODE_SCHEME: "FlightCompanion"

    # ── Scripts ────────────────────────────────────────────────
    scripts:
      - name: Increment build number
        script: |
          cd ios
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build iOS IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-destination 'generic/platform=iOS'"

    # ── Artifacts ──────────────────────────────────────────────
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    # ── Notifications ──────────────────────────────────────────
    publishing:
      email:
        recipients:
          - a.rodriguez122511@gmail.com
        notify:
          success: true
          failure: true
