<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSFS Flight Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../node_modules/maplibre-gl/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─────────────────────────────────────────────────────────
       TITLE BAR (draggable, native-feel)
  ───────────────────────────────────────────────────────── -->
  <div class="title-bar" id="title-bar">
    <div class="title-bar-drag"></div>
    <div class="tb-controls">
      <button class="tb-btn tb-close"   id="btn-close"    title="Minimize to tray"></button>
      <button class="tb-btn tb-min"     id="btn-minimize" title="Minimize"></button>
    </div>
  </div>

  <!-- ─────────────────────────────────────────────────────────
       MAP — full screen background
  ───────────────────────────────────────────────────────── -->
  <div id="map"></div>

  <!-- ─────────────────────────────────────────────────────────
       TOP BAR — connection + route + buttons
  ───────────────────────────────────────────────────────── -->
  <div class="top-bar">
    <!-- Connection indicator -->
    <div class="conn-chip" id="conn-chip">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">Waiting for MSFS…</span>
    </div>

    <!-- Route badge -->
    <div class="route-badge" id="route-badge">
      <span class="rb-icao" id="rb-orig">——</span>
      <svg class="rb-arrow" viewBox="0 0 24 8" fill="none">
        <path d="M0 4h20M16 1l4 3-4 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="rb-icao" id="rb-dest">——</span>
      <span class="rb-sep"></span>
      <span class="rb-tag" id="rb-ac">——</span>
      <span class="rb-tag rb-fn" id="rb-fn"></span>
      <span class="rb-tag rb-fl" id="rb-fl"></span>
    </div>

    <!-- Action buttons -->
    <div class="top-actions">
      <button class="action-btn" id="btn-satellite" title="Toggle Satellite/Dark">🛰 Satellite</button>
      <button class="action-btn action-btn-primary" id="btn-simbrief">📋 SimBrief</button>
    </div>
  </div>

  <!-- ─────────────────────────────────────────────────────────
       LIVE DATA CARD — top right
  ───────────────────────────────────────────────────────── -->
  <div class="float-card live-card" id="live-card">
    <div class="live-grid">
      <div class="live-item">
        <div class="live-label">ALT</div>
        <div class="live-val" id="ld-alt">——</div>
        <div class="live-unit">ft</div>
      </div>
      <div class="live-item">
        <div class="live-label">IAS</div>
        <div class="live-val" id="ld-ias">——</div>
        <div class="live-unit">kts</div>
      </div>
      <div class="live-item">
        <div class="live-val live-val-big" id="ld-vs">——</div>
        <div class="live-unit">fpm</div>
        <div class="live-label">V/S</div>
      </div>
      <div class="live-item">
        <div class="live-label">GS</div>
        <div class="live-val" id="ld-gs">——</div>
        <div class="live-unit">kts</div>
      </div>
      <div class="live-item">
        <div class="live-label">HDG</div>
        <div class="live-val" id="ld-hdg">——</div>
        <div class="live-unit">°T</div>
      </div>
      <div class="live-item">
        <div class="live-label">FUEL</div>
        <div class="live-val" id="ld-fuel">——</div>
        <div class="live-unit">gal</div>
      </div>
    </div>
  </div>

  <!-- ─────────────────────────────────────────────────────────
       FLIGHT INFO CARD — bottom, spanning
  ───────────────────────────────────────────────────────── -->
  <div class="float-card fi-card" id="fi-card">
    <!-- Phase + progress -->
    <div class="fi-top">
      <div class="fi-left">
        <span class="phase-pill" id="fi-phase">PREFLIGHT</span>
        <div class="fi-route-track">
          <span class="fi-icao" id="fi-orig">——</span>
          <div class="fi-progress-wrap">
            <div class="fi-progress-track">
              <div class="fi-progress-fill" id="fi-progress-fill"></div>
            </div>
            <div class="fi-progress-plane" id="fi-progress-plane">✈</div>
          </div>
          <span class="fi-icao" id="fi-dest">——</span>
        </div>
      </div>
      <!-- Delay chip -->
      <div class="delay-chip" id="delay-chip" style="display:none">
        <span id="delay-val">——</span>
      </div>
    </div>

    <!-- Divider -->
    <div class="fi-divider"></div>

    <!-- Times row -->
    <div class="fi-times">
      <!-- STD -->
      <div class="fi-time-group">
        <div class="fi-tg-label">DEPARTURE</div>
        <div class="fi-tg-cols">
          <div class="fi-time-item">
            <div class="fi-t-code">STD</div>
            <div class="fi-t-val" id="fi-std">——:——</div>
          </div>
          <div class="fi-time-item fi-time-actual">
            <div class="fi-t-code">ATD</div>
            <div class="fi-t-val" id="fi-atd">——:——</div>
          </div>
        </div>
      </div>

      <!-- Separator -->
      <div class="fi-ts-sep"></div>

      <!-- REM — big center -->
      <div class="fi-time-group fi-time-center">
        <div class="fi-tg-label">TIME REMAINING</div>
        <div class="fi-t-rem" id="fi-rem">——h ——m</div>
        <div class="fi-t-rem-sub" id="fi-eta-sub">ETA ——:——Z</div>
      </div>

      <!-- Separator -->
      <div class="fi-ts-sep"></div>

      <!-- STA -->
      <div class="fi-time-group fi-time-right">
        <div class="fi-tg-label">ARRIVAL</div>
        <div class="fi-tg-cols">
          <div class="fi-time-item">
            <div class="fi-t-code">STA</div>
            <div class="fi-t-val" id="fi-sta">——:——</div>
          </div>
          <div class="fi-time-item fi-time-eta">
            <div class="fi-t-code">ETA</div>
            <div class="fi-t-val" id="fi-eta">——:——</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ─────────────────────────────────────────────────────────
       TRAFFIC POPUP — shows on AI aircraft click
  ───────────────────────────────────────────────────────── -->
  <div class="traffic-popup" id="traffic-popup" style="display:none">
    <div class="tp-header">
      <div class="tp-callsign" id="tp-callsign">——</div>
      <div class="tp-model" id="tp-model">——</div>
    </div>
    <div class="tp-divider"></div>
    <div class="tp-stats">
      <div class="tp-stat"><span class="tp-lbl">ALT</span><span class="tp-val" id="tp-alt">——</span></div>
      <div class="tp-stat"><span class="tp-lbl">GS</span><span class="tp-val" id="tp-gs">——</span></div>
      <div class="tp-stat"><span class="tp-lbl">HDG</span><span class="tp-val" id="tp-hdg">——</span></div>
    </div>
    <button class="tp-close" id="tp-close">✕</button>
  </div>

  <!-- ─────────────────────────────────────────────────────────
       SCRIPTS
  ───────────────────────────────────────────────────────── -->
  <script src="../node_modules/maplibre-gl/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
